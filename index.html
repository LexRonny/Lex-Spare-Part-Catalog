<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>LEX ROGERS // Universal Spare Part Catalog v1.0</title>
    <style>
        :root {
            --bg-dark: #070304;
            --panel-bg: #110507;
            --border-red: #4d0e14;
            --accent-red: #a3111d;
            --glow-red: rgba(163, 17, 29, 0.5);
            --holo-blue: #00f0ff;
            --holo-glow: rgba(0, 240, 255, 0.3);
            --text-main: #d9c5c7;
            --text-muted: #826a6d;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }

        header {
            border: 2px solid var(--accent-red);
            box-shadow: 0 0 20px var(--glow-red);
            padding: 25px;
            background: var(--panel-bg);
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        h1 {
            color: var(--accent-red);
            text-shadow: 0 0 10px var(--glow-red);
            letter-spacing: 4px;
            margin: 0;
            font-size: 2.5rem;
        }

        .subtitle {
            color: var(--holo-blue);
            text-shadow: 0 0 8px var(--holo-glow);
            font-size: 0.95rem;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-red);
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9);
        }

        .stat-num {
            font-size: 1.8rem;
            color: var(--holo-blue);
            text-shadow: 0 0 8px var(--holo-glow);
            font-weight: bold;
        }

        .search-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-red);
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: #050102;
            border: 1px solid var(--border-red);
            color: var(--text-main);
            padding: 10px;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--holo-blue);
            box-shadow: 0 0 8px var(--holo-glow);
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .part-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-red);
            padding: 20px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .part-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent-red);
        }

        .part-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            border-bottom: 1px dashed var(--border-red);
            padding-bottom: 8px;
        }

        .part-id {
            color: var(--holo-blue);
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 0 0 5px var(--holo-glow);
        }

        .universe-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            background: rgba(163, 17, 29, 0.1);
        }

        .universe-badge.fanmade {
            border-color: var(--holo-blue);
            color: var(--holo-blue);
            background: var(--holo-glow);
        }

        .part-name {
            font-size: 1.2rem;
            color: #fff;
            margin: 5px 0;
        }

        .details-list {
            font-size: 0.85rem;
            color: var(--text-muted);
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
        }

        .details-list li {
            margin-bottom: 4px;
        }

        .details-list span {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header>
        <h1>LEX ROGERS INDUSTRIAL CATALOGUE</h1>
        <div class="subtitle">// Ulovlig Galaktisk Komponent- og Råvarearkiv (Canon, Legends & Custom Fan-Made) //</div>
    </header>

    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-label">Katalogiserte Poster</div>
            <div class="stat-num" id="stat-count">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Arkivstatus</div>
            <div class="stat-num" style="font-size: 1.2rem; color: var(--accent-red); margin-top: 5px;">BLACK MARKET / SYNC</div>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Søk etter Record ID, Navn, Produsent eller Kategori..." onkeyup="filterCatalog()">
    </div>

    <div class="catalog-grid" id="catalogGrid">
        <!-- Komponenter lastes dynamisk herfra -->
    </div>

    <script>
        let allParts = [];

        // Henter data fra den eksterne JSON-filen slik at du slipper å endre koden her for hver nye del!
        fetch('components.json')
            .then(res => res.json())
            .then(data => {
                allParts = data.components;
                renderCatalog(allParts);
                document.getElementById('stat-count').innerText = allParts.length;
            })
            .catch(err => {
                document.getElementById('catalogGrid').innerHTML = `<p style="color:var(--accent-red);">Kritisk feil: Fant ikke 'components.json'. Sjekk at filen eksisterer i mappen.</p>`;
            });

        function renderCatalog(parts) {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';
            
            parts.forEach(part => {
                let badgeClass = part.universeStatus === 'Fan-Made' ? 'universe-badge fanmade' : 'universe-badge';
                
                let html = `
                    <div class="part-card">
                        <div class="part-header">
                            <span class="part-id">${part.id}</span>
                            <span class="${badgeClass}">${part.universeStatus}</span>
                        </div>
                        <div class="part-name">${part.name}</div>
                        <div style="font-size:0.8rem; color:var(--holo-blue); margin-bottom: 8px;">${part.categoryPath}</div>
                        <p style="font-size:0.85rem; margin: 5px 0;">${part.overview.shortDescription}</p>
                        <ul class="details-list">
                            <li>Produsent: <span>${part.manufacturing.manufacturer}</span></li>
                            <li>Kilde/Konfidens: <span>${part.sources.originalSource} (${part.sources.confidence})</span></li>
                            <li>Lex Note: <span>${part.lexNotes.lexNote}</span></li>
                        </ul>
                    </div>
                `;
                grid.innerHTML += html;
            });
        }

        function filterCatalog() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allParts.filter(p => 
                p.id.toLowerCase().includes(query) ||
                p.name.toLowerCase().includes(query) ||
                p.manufacturing.manufacturer.toLowerCase().includes(query) ||
                p.categoryPath.toLowerCase().includes(query)
            );
            renderCatalog(filtered);
        }
    </script>
</body>
</html>
